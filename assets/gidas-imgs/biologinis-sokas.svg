<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <defs>
    <style>
      text { font-family: 'Georgia', serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" fill="#eef0eb" rx="12"/>

  <!-- Timeline base line -->
  <line x1="60" y1="210" x2="740" y2="210" stroke="#c5c9be" stroke-width="2"/>

  <!-- Normal wave (before shock) - calm sine wave -->
  <path d="M60,210 C90,180 120,180 150,210 C180,240 210,240 240,210 C270,180 300,180 320,210"
        fill="none" stroke="#5c5c3d" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Shock point -->
  <line x1="340" y1="90" x2="340" y2="320" stroke="#8b6f5e" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Lightning bolt at shock -->
  <polygon points="340,95 328,155 338,155 326,200 352,140 340,140 352,95"
           fill="#8b6f5e" opacity="0.85"/>

  <!-- Disrupted wave (after shock) -->
  <path d="M340,210 C360,100 380,320 400,210 C420,110 440,300 460,210 C480,130 500,280 520,210 C540,150 560,260 580,210 C600,170 620,240 640,210 C660,185 680,225 710,210"
        fill="none" stroke="#5c5c3d" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Arrow at end -->
  <polygon points="710,210 698,204 698,216" fill="#5c5c3d"/>

  <!-- Label: Biologinis šokas -->
  <rect x="265" y="55" width="150" height="32" rx="6" fill="#5c5c3d"/>
  <text x="340" y="76" text-anchor="middle" fill="#eef0eb" font-size="13" font-weight="bold">Biologinis šokas</text>

  <!-- Labels below -->
  <text x="190" y="270" text-anchor="middle" fill="#6b5a4a" font-size="13">Įprastas gyvenimas</text>
  <text x="190" y="288" text-anchor="middle" fill="#6b5a4a" font-size="12">(kūnas ramybėje)</text>

  <text x="530" y="355" text-anchor="middle" fill="#6b5a4a" font-size="13">Psichikos ir kūno</text>
  <text x="530" y="373" text-anchor="middle" fill="#6b5a4a" font-size="12">atsakas į konfliktą</text>

  <!-- Three impact labels -->
  <rect x="390" y="30" width="110" height="26" rx="5" fill="#d9ddd4"/>
  <text x="445" y="48" text-anchor="middle" fill="#2a1f15" font-size="11">Netikėtas</text>

  <rect x="510" y="30" width="110" height="26" rx="5" fill="#d9ddd4"/>
  <text x="565" y="48" text-anchor="middle" fill="#2a1f15" font-size="11">Dramatiškas</text>

  <rect x="630" y="30" width="110" height="26" rx="5" fill="#d9ddd4"/>
  <text x="685" y="48" text-anchor="middle" fill="#2a1f15" font-size="11">Izoliuojantis</text>

  <!-- Dots connecting labels to line -->
  <line x1="445" y1="56" x2="420" y2="120" stroke="#c5c9be" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="565" y1="56" x2="490" y2="140" stroke="#c5c9be" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="685" y1="56" x2="560" y2="155" stroke="#c5c9be" stroke-width="1" stroke-dasharray="3,3"/>
</svg>
